name: Apply terrain sprites
on:
  push:
    branches: [pixel-art-terrain-implementation]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pixel-art-terrain-implementation
      - name: Add PNG sprites and update renderer
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          sprites = {
            "grassland": "",
            "forest": "",
            "water": ""
          }

          asset_dir = Path("assets/tiles")
          asset_dir.mkdir(parents=True, exist_ok=True)
          for name, encoded in sprites.items():
            (asset_dir / f"{name}.png").write_bytes(base64.b64decode(encoded))

          renderer = Path("src/renderer.js")
          source = renderer.read_text()
          marker = 'import { updateScore } from "./hud.js";\n'
          sprite_setup = '''\nconst TERRAIN_SPRITE_PATHS = {\n  grassland: "assets/tiles/grassland.png",\n  forest: "assets/tiles/forest.png",\n  water: "assets/tiles/water.png"\n};\n\nconst terrainSprites = Object.fromEntries(\n  Object.entries(TERRAIN_SPRITE_PATHS).map(([type, source]) => {\n    const image = new Image();\n    image.decoding = "async";\n    image.onload = () => draw();\n    image.onerror = () => console.warn(`Unable to load terrain sprite: ${source}`);\n    image.src = source;\n    return [type, image];\n  })\n);\n'''
          if "TERRAIN_SPRITE_PATHS" not in source:
            source = source.replace(marker, marker + sprite_setup)

          old = '''function drawTerrainHex(type, x, y) {\n  const colour = terrainTypes[type].colour;'''
          new = '''function drawTerrainHex(type, x, y) {\n  if (drawTerrainSprite(type, x, y)) {\n    return;\n  }\n\n  const colour = terrainTypes[type].colour;'''
          source = source.replace(old, new)

          helper_marker = "function drawTileArt(type, x, y) {"
          helper = '''function drawTerrainSprite(type, x, y) {\n  const sprite = terrainSprites[type];\n\n  if (!sprite || !sprite.complete || sprite.naturalWidth === 0) {\n    return false;\n  }\n\n  ctx.save();\n  ctx.clip();\n  ctx.imageSmoothingEnabled = false;\n  ctx.drawImage(sprite, x - 52, y - 52, 104, 104);\n  ctx.restore();\n\n  ctx.save();\n  ctx.strokeStyle = "rgba(43, 53, 37, 0.75)";\n  ctx.lineWidth = 1.5 / camera.zoom;\n  ctx.stroke();\n  ctx.restore();\n  return true;\n}\n\n'''
          if "function drawTerrainSprite" not in source:
            source = source.replace(helper_marker, helper + helper_marker)

          renderer.write_text(source)
          Path("PIXEL_ART_TERRAIN.md").write_text("""# Pixel-art terrain sprites\n\nThis branch adds transparent PNG sprites for grassland, forest, and water terrain. The renderer clips each sprite to the existing hex path and preserves the procedural renderer as a fallback. Mountain terrain remains procedural until a suitable mountain sprite is available.\n""")
          PY
      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/renderer.js assets/tiles/*.png PIXEL_ART_TERRAIN.md
          git diff --cached --quiet && exit 0
          git commit -m "Add pixel-art terrain sprites"
          git push origin HEAD:pixel-art-terrain-implementation
