<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Builder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .header {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        #resourcesContainer {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            flex-wrap: wrap;
        }

        .game-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: flex-start;
        }

        #gameCanvas {
            border: 2px solid #333;
            background-color: white;
            flex-shrink: 0;
        }

        .tile-options-container {
            background: white;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            min-width: 300px;
            max-height: 700px;
            overflow-y: auto;
        }

        .tile-options-container h3 {
            margin-top: 0;
            text-align: center;
            font-size: 20px;
        }

        #tileOptions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tile-option {
            background: #f9f9f9;
            border: 3px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .tile-option:hover {
            border-color: #888;
            background: #efefef;
            transform: scale(1.02);
        }

        .tile-option.selected {
            border: 4px solid black;
            background: #e8f5e9;
            font-weight: bold;
        }

        .tile-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .tile-description {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
            font-style: italic;
        }

        .tile-label {
            font-size: 24px;
            margin-bottom: 5px;
            color: #555;
        }
    </style>
</head>
<body>
    <div id="resourcesContainer">
        <div>🌾 Food: <span id="food">0</span></div>
        <div>🌲 Wood: <span id="wood">0</span></div>
        <div>⛏️ Stone: <span id="stone">0</span></div>
        <div>✨ Gold: <span id="gold">0</span></div>
        <div>👥 Population: <span id="population">0</span></div>
    </div>

    <div class="header">
        <div>Turn: <span id="turn">1</span></div>
        <h3>Score: <span id="score">0</span></h3>
    </div>

    <div class="game-container">
        <div class="tile-options-container">
            <h3>Choose a Tile</h3>
            <div id="tileOptions"></div>
        </div>
        <canvas id="gameCanvas" width="900" height="700"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
