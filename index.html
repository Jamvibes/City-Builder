<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hearth &amp; Hex — City Builder</title>
  <style>
    :root { --ink:#2b2118; --paper:#f3e3bd; --paper-light:#fff9e9; --gold:#d7a842; --shadow:rgba(31,20,12,.28); }
    * { box-sizing:border-box; }
    body { font-family:Georgia,"Times New Roman",serif; margin:0; min-height:100vh; padding:18px clamp(12px,2vw,30px) 32px; color:var(--ink); background:radial-gradient(circle at 15% 10%,rgba(255,222,148,.22),transparent 26rem),linear-gradient(rgba(31,50,35,.91),rgba(18,33,28,.97)),#1d342a; }
    body::before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.16; background-image:repeating-linear-gradient(115deg,transparent 0 18px,rgba(255,255,255,.06) 19px,transparent 20px); }
    .top-bar { max-width:1440px; margin:0 auto 16px; display:flex; align-items:center; justify-content:space-between; gap:18px; }
    .brand { color:#fff4d8; text-shadow:0 2px 0 #3b2418; }
    .brand h1 { margin:0; font-size:clamp(25px,3vw,40px); letter-spacing:.02em; }
    .brand p { margin:2px 0 0; color:#d6c49e; font-size:13px; letter-spacing:.12em; text-transform:uppercase; }
    .header { display:flex; gap:10px; font-size:15px; font-weight:bold; }
    .header>div,.header h3 { margin:0; padding:9px 14px; color:#fff6df; border:1px solid rgba(255,255,255,.22); border-radius:999px; background:rgba(18,24,19,.58); box-shadow:inset 0 1px rgba(255,255,255,.08); }
    #resourcesContainer { display:flex; gap:10px; max-width:1440px; margin:0 auto 16px; padding:10px; font-size:15px; font-weight:bold; flex-wrap:wrap; justify-content:center; border:1px solid rgba(255,239,201,.3); border-radius:14px; background:rgba(16,29,24,.72); box-shadow:0 8px 22px rgba(0,0,0,.18); }
    #resourcesContainer>div { min-width:116px; padding:7px 12px; border-radius:9px; color:#e8d7b7; background:rgba(255,255,255,.07); }
    #resourcesContainer span { color:#fff8dc; font-size:18px; }
    .resource-icon { margin-right:5px; filter:drop-shadow(0 1px 0 #000); }
    .game-container { display:flex; max-width:1440px; margin:0 auto; gap:18px; justify-content:center; align-items:flex-start; }
    #gameCanvas { display:block; width:min(900px,calc(100vw - 430px)); height:auto; border:4px solid #4d301f; border-radius:16px; background:#b6d9bf; box-shadow:0 16px 38px rgba(0,0,0,.35),inset 0 0 0 2px #c6944c; cursor:crosshair; }
    .side-column { display:flex; flex-direction:column; gap:14px; min-width:340px; max-width:370px; }
    .tile-options-container,.objective-panel { background:linear-gradient(145deg,var(--paper-light),var(--paper)); border:2px solid #70482d; border-radius:13px; padding:17px; box-shadow:0 8px 18px var(--shadow),inset 0 0 0 2px rgba(255,255,255,.55); }
    .tile-options-container { max-height:520px; overflow-y:auto; scrollbar-color:#9b7545 transparent; }
    .tile-options-container h3,.objective-panel h3 { margin-top:0; text-align:center; font-size:21px; }
    .objective-panel { font-size:14px; line-height:1.4; }
    .objective-panel p { color:#655440; }
    .objective-line,.objective-complete { margin:8px 0; padding:8px; border:1px solid rgba(94,70,42,.18); border-radius:8px; background:rgba(255,255,255,.48); }
    .objective-complete { background:#e3edcf; color:#294d2d; font-weight:bold; }
    .objective-muted { color:#766650; text-align:center; }
    .objective-hint { font-style:italic; color:#744f7c; }
    .upgrade-button,.reroll-button { width:100%; border:2px solid #5b351e; border-radius:9px; padding:11px; background:linear-gradient(#e7ba58,#bd7c2d); color:#2d2015; font-weight:bold; cursor:pointer; box-shadow:inset 0 1px rgba(255,255,255,.5),0 2px 4px rgba(0,0,0,.18); }
    .reroll-button { margin-top:14px; }
    .upgrade-button:hover,.reroll-button:hover { filter:brightness(1.08); transform:translateY(-1px); }
    .upgrade-button:disabled,.reroll-button:disabled { border-color:#a99b84; background:#d3ccbe; color:#777; cursor:not-allowed; box-shadow:none; }
    #tileOptions { display:flex; flex-direction:column; gap:12px; }
    .tile-option { width:100%; background:rgba(255,255,255,.56); border:2px solid #b69a72; border-radius:12px; padding:14px; cursor:pointer; transition:all .18s ease; text-align:left; box-shadow:0 3px 7px rgba(68,42,22,.13); }
    .tile-option:hover { border-color:#80613d; background:#fffaf0; transform:translateY(-2px); }
    .tile-option.selected { border:3px solid #355c34; background:#edf1d7; box-shadow:0 0 0 2px #d5ad51,0 7px 16px rgba(0,0,0,.2); }
    .tile-option.locked { border-color:#c7973c; background:#fff4d0; }
    .tile-card-header { display:flex; align-items:center; gap:11px; margin-bottom:9px; }
    .tile-title-block { flex:1; }
    .tile-label { min-width:45px; height:45px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:bold; color:#222; border:2px solid rgba(0,0,0,.25); box-shadow:inset 0 1px rgba(255,255,255,.5); }
    .tile-lock { border:1px solid #a9977d; border-radius:999px; padding:5px 9px; background:#fffaf0; color:#4d3c2c; font-size:12px; font-weight:bold; white-space:nowrap; }
    .tile-name { font-size:19px; font-weight:bold; color:#34271c; }
    .tile-rarity { margin-top:3px; font-size:11px; color:#7a6449; text-transform:uppercase; letter-spacing:.09em; }
    .tile-description { font-size:13px; color:#62513f; line-height:1.4; margin-bottom:11px; }
    .tile-stats { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px 10px; font-size:13px; color:#3f3328; }
    .tile-upgrades { grid-column:1/-1; color:#62513f; }
    button { font-family:inherit; }
    button:focus-visible,.tile-option:focus-visible { outline:3px solid #ffe293; outline-offset:2px; }
    .map-hint { margin:9px 0 0; text-align:center; color:#cdbd9e; font-size:12px; }
    @media(max-width:1050px) { .game-container{flex-direction:column-reverse;align-items:center}.side-column{width:min(900px,100%);max-width:none}#gameCanvas{width:min(900px,100%)}.tile-options-container{max-height:none}#tileOptions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr))} }
    @media(max-width:720px) { .top-bar{align-items:flex-start;flex-direction:column}#tileOptions{grid-template-columns:1fr}.header{width:100%;justify-content:space-between}#resourcesContainer>div{min-width:calc(50% - 10px)} }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="brand"><h1>Hearth &amp; Hex</h1><p>Build a realm worth remembering</p></div>
    <div class="header"><div>Turn <span id="turn">1</span></div><h3>Renown <span id="score">0</span></h3></div>
  </div>
  <div id="resourcesContainer">
    <div><span class="resource-icon">🌾</span>Food: <span id="food">0</span></div>
    <div><span class="resource-icon">🌲</span>Wood: <span id="wood">0</span></div>
    <div><span class="resource-icon">⛏️</span>Stone: <span id="stone">0</span></div>
    <div><span class="resource-icon">✦</span>Gold: <span id="gold">0</span></div>
    <div><span class="resource-icon">♟</span>Population: <span id="population">0</span></div>
  </div>
  <div class="game-container">
    <div class="side-column">
      <div class="objective-panel" id="settlementPanel"></div>
      <div class="objective-panel" id="objectivePanel"></div>
      <div class="tile-options-container">
        <h3>Choose a Tile</h3>
        <div id="tileOptions"></div>
        <button id="rerollTilesButton" class="reroll-button" type="button">↻ Reroll Tiles (1 gold)</button>
      </div>
    </div>
    <div><canvas id="gameCanvas" width="900" height="700" aria-label="City map"></canvas><p class="map-hint">Click to build · Shift-drag to explore · Scroll to zoom</p></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
